kind = "web"
previewPath = "/"
title = "Nibir-Fashion"
version = "1.0.0"
id = "artifacts/Nibir-Fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23496

[services.development]
run = "pnpm --filter @workspace/Nibir-Fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/Nibir-Fashion", "run", "build" ]
publicDir = "artifacts/Nibir-Fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23496"
BASE_PATH = "/"
