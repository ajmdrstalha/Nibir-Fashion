openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management operations
  - name: sales
    description: Sales operations
  - name: products
    description: Product inventory operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
        "401":
          description: Authentication required

  /auth/change-password:
    post:
      operationId: changeOwnPassword
      tags: [auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
        "400":
          description: Validation error
        "401":
          description: Authentication required

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /users/{id}/password:
    patch:
      operationId: updateUserPassword
      tags: [users]
      summary: Reset user password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetUserPasswordBody"
      responses:
        "200":
          description: Password updated
        "403":
          description: Forbidden

  /users/{id}/disable:
    patch:
      operationId: disableUser
      tags: [users]
      summary: Disable user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disabled user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /users/{id}/enable:
    patch:
      operationId: enableUser
      tags: [users]
      summary: Enable user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enabled user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List sales
      description: Returns all sales, optionally filtered by year and month
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Validation error

  /sales/summary/today:
    get:
      operationId: getTodaySummary
      tags: [sales]
      summary: Get today's sales summary
      responses:
        "200":
          description: Today summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /sales/summary/month:
    get:
      operationId: getMonthSummary
      tags: [sales]
      summary: Get this month's sales summary
      responses:
        "200":
          description: Month summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /sales/summary/monthly-totals:
    get:
      operationId: getMonthlyTotals
      tags: [sales]
      summary: Get monthly totals for the year
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Monthly totals array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTotal"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a single sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Not found
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /products/{id}/stock-in:
    post:
      operationId: stockInProduct
      tags: [products]
      summary: Add stock to a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockInBody"
      responses:
        "201":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/stock-movements:
    get:
      operationId: listProductStockMovements
      tags: [products]
      summary: List stock movements for one product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /stock-movements:
    get:
      operationId: listStockMovements
      tags: [products]
      summary: List all stock movements
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, user]
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - role
        - active
        - createdAt

    AuthUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/CurrentUser"
      required:
        - user

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, user]
        active:
          type: boolean
      required:
        - id
        - email
        - name
        - role
        - active

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
        confirmPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword
        - confirmPassword

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]
        active:
          type: boolean
      required:
        - name
        - email
        - password
        - role
        - active

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        active:
          type: boolean
      required:
        - name
        - email
        - role
        - active

    ResetUserPasswordBody:
      type: object
      properties:
        password:
          type: string
          minLength: 8
      required:
        - password

    SaleItem:
      type: object
      properties:
        id:
          type: integer
        saleId:
          type: integer
        productId:
          type: ["integer", "null"]
        name:
          type: string
        size:
          type: string
        qty:
          type: integer
        rate:
          type: number
        amount:
          type: number
      required:
        - id
        - saleId
        - productId
        - name
        - size
        - qty
        - rate
        - amount

    Sale:
      type: object
      properties:
        id:
          type: integer
        billNo:
          type: string
        date:
          type: string
        customer:
          type: string
        phone:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        paymentMethod:
          type: string
        total:
          type: number
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required:
        - id
        - billNo
        - date
        - customer
        - phone
        - note
        - paymentMethod
        - total
        - createdAt
        - items

    CreateSaleItemBody:
      type: object
      properties:
        name:
          type: string
        productId:
          type: integer
        size:
          type: string
        qty:
          type: integer
        rate:
          type: number
      required:
        - name
        - productId
        - size
        - qty
        - rate

    CreateSaleBody:
      type: object
      properties:
        billNo:
          type: string
        date:
          type: string
        customer:
          type: string
        phone:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        paymentMethod:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItemBody"
      required:
        - billNo
        - date
        - customer
        - paymentMethod
        - items

    SalesSummary:
      type: object
      properties:
        total:
          type: number
        count:
          type: integer
      required:
        - total
        - count

    MonthlyTotal:
      type: object
      properties:
        month:
          type: string
        total:
          type: number
        count:
          type: integer
      required:
        - month
        - total
        - count

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        size:
          type: string
        price:
          type: number
        stock:
          type: integer
        currentStock:
          type: integer
        totalStockIn:
          type: integer
        totalSold:
          type: integer
        current_stock:
          type: integer
        total_stock_in:
          type: integer
        total_sold:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - category
        - size
        - price
        - stock
        - currentStock
        - totalStockIn
        - totalSold
        - current_stock
        - total_stock_in
        - total_sold
        - createdAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        size:
          type: string
        price:
          type: number
        stock:
          type: integer
      required:
        - name
        - category
        - size
        - price
        - stock

    StockInBody:
      type: object
      properties:
        quantity:
          type: integer
        note:
          type: ["string", "null"]
      required:
        - quantity

    StockMovement:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        type:
          type: string
          enum: [IN, OUT]
        quantity:
          type: integer
        reason:
          type: string
          enum: [purchase, sale, adjustment, return, manual]
        saleId:
          type: ["integer", "null"]
        createdBy:
          type: ["integer", "null"]
        createdByEmail:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - productId
        - productName
        - type
        - quantity
        - reason
        - saleId
        - createdBy
        - createdByEmail
        - note
        - createdAt
